<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send It — Climbing Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f0e;
    --bg2: #151918;
    --bg3: #1c211f;
    --border: #2a3330;
    --border2: #354540;
    --text: #e8ede8;
    --text2: #8fa899;
    --text3: #566b61;
    --accent: #7fff6e;
    --accent2: #3db832;
    --accent-dim: rgba(127,255,110,0.08);
    --accent-dim2: rgba(127,255,110,0.15);
    --warn: #ffa94d;
    --warn-dim: rgba(255,169,77,0.08);
    --info: #5bc0eb;
    --info-dim: rgba(91,192,235,0.08);
    --danger: #ff6b6b;
    --danger-dim: rgba(255,107,107,0.08);
    --radius: 10px;
    --radius2: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }
  /* ── Layout ── */
  .shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 56px 1fr;
    min-height: 100vh;
  }
  header {
    grid-column: 1/-1;
    display: flex;
    align-items: center;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text3); }
  header nav { display: flex; gap: 4px; margin-left: auto; }
  header nav button {
    background: none; border: none; color: var(--text2);
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    transition: all .15s;
  }
  header nav button:hover { background: var(--bg3); color: var(--text); }
  header nav button.active {
    background: var(--accent-dim2); color: var(--accent);
  }
  sidebar {
    display: block;
    border-right: 1px solid var(--border);
    padding: 24px 0;
    background: var(--bg2);
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 0 16px 20px;
  }
  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding: 0 4px;
  }
  main { padding: 32px 36px; overflow-y: auto; }
  /* ── Page sections ── */
  .page { display: none; }
  .page.active { display: block; }
  /* ── Cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    padding: 24px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: .8px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 16px;
  }
  /* ── Grid layouts ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  /* ── Form elements ── */
  label.field-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: .3px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  input::placeholder { color: var(--text3); }
  select option { background: var(--bg3); }
  .field-group { margin-bottom: 16px; }
  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border: none; border-radius: var(--radius); cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600;
    padding: 11px 22px; transition: all .15s; letter-spacing: .2px;
  }
  .btn-primary {
    background: var(--accent); color: #0d1a0b;
  }
  .btn-primary:hover { background: #9dff8e; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger {
    background: var(--danger-dim); color: var(--danger);
    border: 1px solid transparent;
  }
  .btn-danger:hover { border-color: var(--danger); }
  /* ── Exercise categories ── */
  .cat-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .3px;
  }
  .cat-finger    { background: rgba(255,169,77,.15); color: #ffa94d; }
  .cat-endurance { background: rgba(91,192,235,.15); color: #5bc0eb; }
  .cat-strength  { background: rgba(127,255,110,.15); color: #7fff6e; }
  .cat-technique { background: rgba(200,150,255,.15); color: #c896ff; }
  .cat-power     { background: rgba(255,107,107,.15); color: #ff6b6b; }
  .cat-mobility  { background: rgba(255,213,79,.15); color: #ffd34f; }
  /* ── Session form ── */
  #exercise-list { display: flex; flex-direction: column; gap: 12px; }
  .exercise-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } }
  .exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .exercise-name {
    font-size: 14px; font-weight: 600; color: var(--text);
  }
  .exercise-meta-row {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .metric-mini {
    display: flex; flex-direction: column; gap: 4px;
    flex: 1; min-width: 80px;
  }
  .metric-mini label { font-size: 11px; color: var(--text3); font-weight: 500; }
  .metric-mini input {
    padding: 7px 10px;
    font-size: 13px;
  }
  .remove-btn {
    background: none; border: none; color: var(--text3); cursor: pointer;
    padding: 4px; border-radius: 4px; font-size: 16px; line-height: 1;
    transition: color .15s;
  }
  .remove-btn:hover { color: var(--danger); }
  /* ── Sidebar exercise picker ── */
  .excat-group { margin-bottom: 12px; }
  .excat-header {
    font-size: 11px; font-weight: 600; color: var(--text3);
    letter-spacing: .5px; margin-bottom: 4px; padding: 0 4px;
  }
  .ex-btn {
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: var(--text2);
    font-family: inherit;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ex-btn:hover { background: var(--bg3); color: var(--text); }
  .ex-btn .dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  /* ── Log list ── */
  .session-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 10px;
    transition: border-color .15s;
  }
  .session-card:hover { border-color: var(--border2); }
  .session-card-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .session-date {
    font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--text3);
  }
  .session-note {
    font-size: 13px; color: var(--text2); margin-top: 6px;
    font-style: italic;
  }
  .session-exercises {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  /* ── Stats page ── */
  .stat-tile {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    padding: 20px 24px;
  }
  .stat-tile .val {
    font-family: 'DM Mono', monospace;
    font-size: 32px; font-weight: 300;
    color: var(--accent); letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-tile .label {
    font-size: 12px; color: var(--text3); font-weight: 500; letter-spacing: .3px;
  }
  .chart-wrap {
    position: relative;
    height: 280px;
  }
  /* ── Period selector ── */
  .period-tabs {
    display: flex; gap: 4px; background: var(--bg3);
    border-radius: 8px; padding: 3px; width: fit-content;
    margin-bottom: 20px;
  }
  .period-tab {
    background: none; border: none; font-family: inherit;
    font-size: 12px; font-weight: 500;
    color: var(--text3); padding: 5px 14px;
    border-radius: 5px; cursor: pointer; transition: all .15s;
  }
  .period-tab.active {
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--border);
  }
  /* ── Focus breakdown ── */
  .focus-bar-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .focus-bar-label {
    width: 90px; font-size: 12px; font-weight: 600; color: var(--text2);
    text-align: right; flex-shrink: 0;
  }
  .focus-bar-track {
    flex: 1; height: 8px; background: var(--bg3);
    border-radius: 4px; overflow: hidden;
  }
  .focus-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width .6s cubic-bezier(.16,1,.3,1);
  }
  .focus-bar-pct {
    width: 36px; font-family: 'DM Mono', monospace;
    font-size: 12px; color: var(--text3); text-align: right; flex-shrink: 0;
  }
  /* ── Notification toast ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 22px;
    font-size: 13px; font-weight: 500; color: var(--text);
    transition: transform .3s cubic-bezier(.16,1,.3,1);
    z-index: 9999; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  /* ── Empty states ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text3); font-size: 14px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  /* ── Responsive ── */
  @media (max-width: 768px) {
    .shell { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
    sidebar { display: none; }
    main { padding: 20px 16px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  /* ── Divider ── */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  /* ── Page title ── */
  .page-title {
    font-size: 22px; font-weight: 600; letter-spacing: -.5px;
    margin-bottom: 6px;
  }
  .page-subtitle { font-size: 14px; color: var(--text3); margin-bottom: 28px; }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="logo">send<span>//</span>it</div>
    <nav>
      <button class="active" onclick="showPage('log', this)">Log session</button>
      <button onclick="showPage('history', this)">History</button>
      <button onclick="showPage('stats', this)">Analytics</button>
    </nav>
  </header>

  <sidebar id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Add exercises</div>
      <div id="sidebar-exercises"></div>
    </div>
  </sidebar>

  <main>
    <!-- LOG PAGE -->
    <div class="page active" id="page-log">
      <div class="page-title">New session</div>
      <div class="page-subtitle">Pick exercises from the sidebar, fill in your metrics.</div>

      <div class="grid-2" style="margin-bottom:16px">
        <div class="field-group">
          <label class="field-label">Date</label>
          <input type="date" id="session-date">
        </div>
        <div class="field-group">
          <label class="field-label">Location</label>
          <input type="text" id="session-location" placeholder="e.g. Centro de Escalada, Moonboard">
        </div>
      </div>

      <div id="exercise-list">
        <div class="empty-state" id="ex-empty">
          <div class="empty-icon">🪨</div>
          <div>Click exercises in the sidebar to add them.</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="field-group">
        <label class="field-label">Session notes</label>
        <textarea id="session-notes" rows="3" placeholder="How did it feel? Any PRs, injuries, observations..."></textarea>
      </div>

      <div style="display:flex; gap:10px; margin-top:4px;">
        <button class="btn btn-primary" onclick="saveSession()">Save session</button>
        <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <!-- HISTORY PAGE -->
    <div class="page" id="page-history">
      <div class="page-title">Session history</div>
      <div class="page-subtitle">All logged sessions, most recent first.</div>
      <div id="history-list"></div>
    </div>

    <!-- STATS PAGE -->
    <div class="page" id="page-stats">
      <div class="page-title">Analytics</div>
      <div class="page-subtitle">Training focus distribution and trends.</div>

      <div class="period-tabs">
        <button class="period-tab active" data-days="7" onclick="setPeriod(7, this)">7 days</button>
        <button class="period-tab" data-days="30" onclick="setPeriod(30, this)">30 days</button>
        <button class="period-tab" data-days="90" onclick="setPeriod(90, this)">3 months</button>
        <button class="period-tab" data-days="365" onclick="setPeriod(365, this)">Year</button>
        <button class="period-tab" data-days="0" onclick="setPeriod(0, this)">All time</button>
      </div>

      <div class="grid-3" style="margin-bottom:20px" id="stat-tiles"></div>

      <div class="grid-2" style="margin-bottom:20px">
        <div class="card">
          <div class="card-title">Focus breakdown</div>
          <div id="focus-breakdown"></div>
        </div>
        <div class="card">
          <div class="card-title">Distribution</div>
          <div class="chart-wrap">
            <canvas id="pie-chart"></canvas>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Sessions over time</div>
        <div class="chart-wrap">
          <canvas id="line-chart"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// DATA: Exercise definitions
// ═══════════════════════════════════════════
const CATEGORIES = {
  finger:    { label: 'Finger',    color: '#ffa94d', bar: '#ffa94d' },
  endurance: { label: 'Endurance', color: '#5bc0eb', bar: '#5bc0eb' },
  strength:  { label: 'Strength',  color: '#7fff6e', bar: '#7fff6e' },
  technique: { label: 'Technique', color: '#c896ff', bar: '#c896ff' },
  power:     { label: 'Power',     color: '#ff6b6b', bar: '#ff6b6b' },
  mobility:  { label: 'Mobility',  color: '#ffd34f', bar: '#ffd34f' },
};

// Metrics: 'reps', 'sets', 'weight', 'time', 'duration'
// Each exercise has: name, categories (array), metrics (array)
const EXERCISES = [
  // FINGER TRAINING
  { id: 'hangboard_max',    name: 'Max hangs',            cats: ['finger'],            metrics: ['weight', 'sets', 'time'] },
  { id: 'hangboard_rep',    name: 'Repeaters',            cats: ['finger', 'endurance'], metrics: ['sets', 'time'] },
  { id: 'hangboard_hng',    name: 'Half-crimp hang',      cats: ['finger'],            metrics: ['weight', 'sets', 'time'] },
  { id: 'fingerboard_slop', name: 'Open-hand hang',       cats: ['finger'],            metrics: ['weight', 'sets', 'time'] },
  { id: 'pinch_block',      name: 'Pinch block',          cats: ['finger', 'strength'], metrics: ['weight', 'sets', 'reps'] },
  // ENDURANCE
  { id: 'arc_traverse',     name: 'ARC traversing',       cats: ['endurance'],         metrics: ['duration'] },
  { id: 'circuit_board',    name: 'Circuit board laps',   cats: ['endurance'],         metrics: ['sets', 'reps'] },
  { id: 'route_4x4',        name: '4×4s',                 cats: ['endurance', 'power'], metrics: ['sets'] },
  { id: 'campusing_end',    name: 'Campus endurance',     cats: ['endurance'],         metrics: ['sets', 'reps'] },
  // STRENGTH
  { id: 'pullups',          name: 'Pull-ups',             cats: ['strength'],          metrics: ['weight', 'sets', 'reps'] },
  { id: 'lock_offs',        name: 'Lock-offs',            cats: ['strength'],          metrics: ['sets', 'time'] },
  { id: 'front_levers',     name: 'Front lever',          cats: ['strength'],          metrics: ['sets', 'time'] },
  { id: 'core_tension',     name: 'Core tension',         cats: ['strength'],          metrics: ['sets', 'reps'] },
  { id: 'lat_pulldown',     name: 'Lat pulldown',         cats: ['strength'],          metrics: ['weight', 'sets', 'reps'] },
  // POWER
  { id: 'campus_max',       name: 'Campus max moves',     cats: ['power', 'finger'],   metrics: ['sets', 'reps'] },
  { id: 'dyno_training',    name: 'Dyno training',        cats: ['power'],             metrics: ['sets', 'reps'] },
  { id: 'kilterboard',      name: 'Kilterboard boulders', cats: ['power', 'technique'], metrics: ['sets'] },
  { id: 'moonboard',        name: 'Moonboard boulders',   cats: ['power', 'technique'], metrics: ['sets'] },
  { id: 'boulder_proj',     name: 'Boulder projects',     cats: ['power', 'technique'], metrics: ['sets'] },
  // TECHNIQUE
  { id: 'slab_drills',      name: 'Slab technique',       cats: ['technique'],         metrics: ['duration'] },
  { id: 'footwork_drills',  name: 'Footwork drills',      cats: ['technique'],         metrics: ['sets', 'reps'] },
  { id: 'movement_games',   name: 'Movement games',       cats: ['technique'],         metrics: ['duration'] },
  { id: 'route_reading',    name: 'Route reading',        cats: ['technique'],         metrics: ['duration'] },
  { id: 'lead_climbing',    name: 'Lead climbing',        cats: ['technique', 'endurance'], metrics: ['sets'] },
  // MOBILITY
  { id: 'hip_flex',         name: 'Hip flexibility',      cats: ['mobility'],          metrics: ['duration'] },
  { id: 'shoulder_mob',     name: 'Shoulder mobility',    cats: ['mobility'],          metrics: ['sets', 'reps'] },
  { id: 'wrist_warm',       name: 'Wrist warm-up',        cats: ['mobility'],          metrics: ['duration'] },
  { id: 'antagonist',       name: 'Antagonist training',  cats: ['mobility', 'strength'], metrics: ['sets', 'reps'] },
];

const METRIC_LABELS = {
  weight: 'Weight (kg)',
  sets: 'Sets',
  reps: 'Reps',
  time: 'Time (s)',
  duration: 'Duration (min)',
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let sessions = JSON.parse(localStorage.getItem('climb_sessions') || '[]');
let currentItems = []; // [{exerciseId, weight, sets, reps, time, duration}]
let currentPeriod = 7;
let pieChartInst = null;
let lineChartInst = null;

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('session-date').value = today();
  buildSidebar();
  refreshStats();
});

function today() {
  return new Date().toISOString().slice(0,10);
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function buildSidebar() {
  const grouped = {};
  Object.keys(CATEGORIES).forEach(k => grouped[k] = []);
  EXERCISES.forEach(ex => ex.cats.forEach(c => grouped[c]?.push(ex)));

  const container = document.getElementById('sidebar-exercises');
  container.innerHTML = '';
  Object.entries(grouped).forEach(([catKey, exes]) => {
    if (!exes.length) return;
    const cat = CATEGORIES[catKey];
    const div = document.createElement('div');
    div.className = 'excat-group';
    div.innerHTML = `<div class="excat-header" style="color:${cat.color}">${cat.label.toUpperCase()}</div>`;
    exes.forEach(ex => {
      const btn = document.createElement('button');
      btn.className = 'ex-btn';
      btn.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${ex.name}`;
      btn.onclick = () => addExercise(ex.id);
      div.appendChild(btn);
    });
    container.appendChild(div);
  });
}

// ═══════════════════════════════════════════
// LOG PAGE
// ═══════════════════════════════════════════
function addExercise(exId) {
  const ex = EXERCISES.find(e => e.id === exId);
  if (!ex) return;
  const item = { id: Date.now(), exerciseId: exId };
  ex.metrics.forEach(m => item[m] = '');
  currentItems.push(item);
  renderExerciseList();
  showPage('log', document.querySelector('nav button'));
  toast(`Added: ${ex.name}`);
}

function renderExerciseList() {
  const list = document.getElementById('exercise-list');
  const empty = document.getElementById('ex-empty');
  if (!currentItems.length) {
    list.innerHTML = '';
    list.appendChild(createEmptyEl());
    return;
  }
  list.innerHTML = '';
  currentItems.forEach(item => {
    const ex = EXERCISES.find(e => e.id === item.exerciseId);
    if (!ex) return;
    const cats = ex.cats.map(c => `<span class="cat-badge cat-${c}">${CATEGORIES[c].label}</span>`).join(' ');
    const metricFields = ex.metrics.map(m => `
      <div class="metric-mini">
        <label>${METRIC_LABELS[m]}</label>
        <input type="number" min="0" placeholder="—"
          value="${item[m] || ''}"
          onchange="updateMetric(${item.id}, '${m}', this.value)">
      </div>
    `).join('');

    const div = document.createElement('div');
    div.className = 'exercise-item';
    div.innerHTML = `
      <div class="exercise-header">
        <div>
          <div class="exercise-name">${ex.name}</div>
          <div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap">${cats}</div>
        </div>
        <button class="remove-btn" onclick="removeExercise(${item.id})" title="Remove">✕</button>
      </div>
      <div class="exercise-meta-row">${metricFields}</div>
    `;
    list.appendChild(div);
  });
}

function createEmptyEl() {
  const d = document.createElement('div');
  d.className = 'empty-state';
  d.id = 'ex-empty';
  d.innerHTML = '<div class="empty-icon">🪨</div><div>Click exercises in the sidebar to add them.</div>';
  return d;
}

function updateMetric(itemId, metric, value) {
  const item = currentItems.find(i => i.id === itemId);
  if (item) item[metric] = parseFloat(value) || '';
}

function removeExercise(itemId) {
  currentItems = currentItems.filter(i => i.id !== itemId);
  renderExerciseList();
}

function saveSession() {
  if (!currentItems.length) { toast('Add at least one exercise.'); return; }
  const session = {
    id: Date.now(),
    date: document.getElementById('session-date').value || today(),
    location: document.getElementById('session-location').value.trim(),
    notes: document.getElementById('session-notes').value.trim(),
    exercises: currentItems.map(item => ({ ...item })),
  };
  sessions.unshift(session);
  localStorage.setItem('climb_sessions', JSON.stringify(sessions));
  clearForm();
  toast('Session saved ✓');
  refreshStats();
}

function clearForm() {
  currentItems = [];
  renderExerciseList();
  document.getElementById('session-date').value = today();
  document.getElementById('session-location').value = '';
  document.getElementById('session-notes').value = '';
}

// ═══════════════════════════════════════════
// HISTORY PAGE
// ═══════════════════════════════════════════
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div>No sessions logged yet.</div></div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(s => {
    const cats = new Set();
    s.exercises.forEach(item => {
      const ex = EXERCISES.find(e => e.id === item.exerciseId);
      if (ex) ex.cats.forEach(c => cats.add(c));
    });
    const badges = [...cats].map(c => `<span class="cat-badge cat-${c}">${CATEGORIES[c].label}</span>`).join(' ');
    const d = document.createElement('div');
    d.className = 'session-card';
    d.innerHTML = `
      <div class="session-card-top">
        <div>
          <div style="font-weight:600;font-size:15px">${formatDate(s.date)}</div>
          ${s.location ? `<div style="font-size:12px;color:var(--text3);margin-top:2px">${s.location}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="session-date">${s.exercises.length} exercise${s.exercises.length!==1?'s':''}</span>
          <button class="btn btn-danger" style="padding:5px 12px;font-size:12px" onclick="deleteSession(${s.id})">Delete</button>
        </div>
      </div>
      <div class="session-exercises">${badges}</div>
      ${s.notes ? `<div class="session-note">"${s.notes}"</div>` : ''}
    `;
    list.appendChild(d);
  });
}

function deleteSession(id) {
  if (!confirm('Delete this session?')) return;
  sessions = sessions.filter(s => s.id !== id);
  localStorage.setItem('climb_sessions', JSON.stringify(sessions));
  renderHistory();
  refreshStats();
  toast('Session deleted.');
}

// ═══════════════════════════════════════════
// STATS PAGE
// ═══════════════════════════════════════════
function setPeriod(days, btn) {
  currentPeriod = days;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  refreshStats();
}

function getFilteredSessions() {
  if (currentPeriod === 0) return sessions;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - currentPeriod);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  return sessions.filter(s => s.date >= cutoffStr);
}

function getCategoryWeights(filtered) {
  const weights = {};
  Object.keys(CATEGORIES).forEach(k => weights[k] = 0);
  let total = 0;
  filtered.forEach(s => {
    s.exercises.forEach(item => {
      const ex = EXERCISES.find(e => e.id === item.exerciseId);
      if (!ex) return;
      // Weight by sets (or 1 if no sets)
      const w = parseFloat(item.sets) || 1;
      ex.cats.forEach(c => {
        weights[c] = (weights[c] || 0) + w / ex.cats.length;
        total += w / ex.cats.length;
      });
    });
  });
  return { weights, total };
}

function refreshStats() {
  const filtered = getFilteredSessions();
  const { weights, total } = getCategoryWeights(filtered);

  // Stat tiles
  const totalExSets = filtered.reduce((acc, s) =>
    acc + s.exercises.reduce((a, i) => a + (parseFloat(i.sets) || 1), 0), 0);
  const tilesEl = document.getElementById('stat-tiles');
  tilesEl.innerHTML = `
    <div class="stat-tile">
      <div class="val">${filtered.length}</div>
      <div class="label">Sessions</div>
    </div>
    <div class="stat-tile">
      <div class="val">${filtered.reduce((a,s) => a + s.exercises.length, 0)}</div>
      <div class="label">Exercises logged</div>
    </div>
    <div class="stat-tile">
      <div class="val">${totalExSets}</div>
      <div class="label">Total sets</div>
    </div>
  `;

  // Focus breakdown bars
  const breakdown = document.getElementById('focus-breakdown');
  if (total === 0) {
    breakdown.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:12px 0">No data for this period.</div>';
  } else {
    const sorted = Object.entries(weights).sort((a,b) => b[1]-a[1]);
    breakdown.innerHTML = sorted.map(([key, val]) => {
      const pct = total > 0 ? Math.round(val / total * 100) : 0;
      const cat = CATEGORIES[key];
      return `
        <div class="focus-bar-row">
          <div class="focus-bar-label">${cat.label}</div>
          <div class="focus-bar-track">
            <div class="focus-bar-fill" style="width:${pct}%;background:${cat.color}"></div>
          </div>
          <div class="focus-bar-pct">${pct}%</div>
        </div>
      `;
    }).join('');
  }

  // Pie chart
  if (pieChartInst) pieChartInst.destroy();
  const pieCtx = document.getElementById('pie-chart').getContext('2d');
  const pieData = Object.entries(weights).filter(([,v]) => v > 0);
  if (pieData.length) {
    pieChartInst = new Chart(pieCtx, {
      type: 'doughnut',
      data: {
        labels: pieData.map(([k]) => CATEGORIES[k].label),
        datasets: [{
          data: pieData.map(([,v]) => v),
          backgroundColor: pieData.map(([k]) => CATEGORIES[k].color + 'cc'),
          borderColor: pieData.map(([k]) => CATEGORIES[k].color),
          borderWidth: 1.5,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: '#8fa899', font: { family: 'Space Grotesk', size: 11 }, padding: 12 }
          },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed;
                const pct = total > 0 ? Math.round(v / total * 100) : 0;
                return ` ${pct}%`;
              }
            },
            backgroundColor: '#1c211f', borderColor: '#2a3330', borderWidth: 1,
            titleColor: '#e8ede8', bodyColor: '#8fa899',
          }
        },
        cutout: '62%',
      }
    });
  } else {
    pieCtx.clearRect(0,0,300,280);
  }

  // Line chart: sessions per day/week
  buildLineChart(filtered);
}

function buildLineChart(filtered) {
  if (lineChartInst) lineChartInst.destroy();
  const ctx = document.getElementById('line-chart').getContext('2d');
  if (!filtered.length) return;

  // Group by date
  const counts = {};
  filtered.forEach(s => { counts[s.date] = (counts[s.date] || 0) + 1; });

  // Fill in all dates in range
  const dates = Object.keys(counts).sort();
  if (!dates.length) return;
  const start = new Date(dates[0]);
  const end = new Date(today());
  const labels = [], data = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    const k = d.toISOString().slice(0,10);
    labels.push(k);
    data.push(counts[k] || 0);
  }

  lineChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Sessions',
        data,
        backgroundColor: 'rgba(127,255,110,0.2)',
        borderColor: '#7fff6e',
        borderWidth: 1.5,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c211f', borderColor: '#2a3330', borderWidth: 1,
          titleColor: '#8fa899', bodyColor: '#e8ede8',
          callbacks: { title: items => formatDate(items[0].label) }
        }
      },
      scales: {
        x: {
          ticks: { color: '#566b61', font: { size: 10, family: 'DM Mono' }, maxTicksLimit: 10 },
          grid: { color: 'rgba(42,51,48,.5)' },
        },
        y: {
          ticks: { color: '#566b61', font: { size: 11, family: 'DM Mono' }, stepSize: 1 },
          grid: { color: 'rgba(42,51,48,.5)' },
          beginAtZero: true,
        }
      }
    }
  });
}

// ═══════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  if (name === 'history') renderHistory();
  if (name === 'stats') refreshStats();
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
</body>
</html>
